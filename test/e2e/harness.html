<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forge E2E Harness</title>
</head>
<body>
  <forge-app id="app" surface="standalone"></forge-app>
  <script src="/dist/forge.js"></script>

    window.loadManifest = function(manifest) {

    };

      return document.getElementById('app');
    };
  </script>
</body>
</html>
